<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>GPX/CSV保存（PowerApps）</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: sans-serif; margin: 10px; }
#map { height: 450px; margin-top: 10px; }

/* ピン */
.number-icon div {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  color: #fff;
  text-align: center;
  line-height: 28px;
  font-weight: bold;
  border: 2px solid #fff;
  font-size: 12px;
}

/* 一覧 */
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #aaa; padding: 4px; }
.no-coord { background: #eee; }
</style>
</head>

<body>
<h3>GPX/CSV保存（PowerApps）</h3>

GPX: <input type="file" id="gpxfile">
CSV/TSV: <input type="file" id="csvfile">
<button id="saveCsv">CSV保存</button>

<div id="map"></div>

<table>
<thead>
<tr>
<th>ID</th><th>Time</th><th>Lat</th><th>Lng</th>
<th>Comment</th><th>User</th><th>Vehicle</th><th>削除</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
const map = L.map('map').setView([35.68,139.76],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let gpxLayer = null;
let pinData = [];

/* 色判定 */
function getColor(id){
  if(/^[0-9]/.test(id)) return "#2A93EE";
  if(/^A/i.test(id)) return "#E74C3C";
  if(/^B/i.test(id)) return "#F39C12";
  if(/^C/i.test(id)) return "#27AE60";
  return "#7F8C8D";
}

/* アイコン */
function createIcon(id){
  return L.divIcon({
    className: 'number-icon',
    html: `<div style="background:${getColor(id)}">${id}</div>`,
    iconSize: [28,28],
    iconAnchor: [14,14]
  });
}

/* GPXファイル読み込み */
document.getElementById('gpxfile').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  if (gpxLayer) map.removeLayer(gpxLayer);

  const reader = new FileReader();
  reader.onload = ev => {
    gpxLayer = new L.GPX(ev.target.result, {async:true})
      .on('loaded', e => map.fitBounds(e.target.getBounds()))
      .addTo(map);
  };
  reader.readAsText(file);
};

/* パース */
function parseLine(line){
  return line.includes('\t')
    ? line.split('\t').map(v=>v.trim())
    : line.split(',').map(v=>v.replace(/"/g,'').trim());
}

function toNumber(v){
  return parseFloat((v||"").replace(/"/g,'').trim());
}

/* CSVファイル読み込み */
document.getElementById('csvfile').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/).filter(l=>l);

    pinData.forEach(p => p.marker && map.removeLayer(p.marker));
    pinData = [];

    const header = parseLine(lines[0]).map(h => h.toLowerCase());

    const find = (names) => {
      for(let i=0; i<header.length; i++){
        const h = header[i].replace(/\s/g, "");
        for(let n of names){
          if(h === n) return i;
        }
      }
      return -1;
    };

    const iID = find(["id"]);
    const iLat = find(["latitude","lat","緯度"]);
    const iLng = find(["longitude","lng","経度"]);
    const iTime = find(["time","recordjst","日時"]);
    const iCom = find(["comment","備考"]);
    const iUser = find(["user","commentuser"]);
    const iVeh = find(["vehicle","vehicleno"]);

    lines.slice(1).forEach(line => {
      const c = parseLine(line);

      const id = c[iID] || "";
      if (!id) return;

      const lat = toNumber(c[iLat]);
      const lng = toNumber(c[iLng]);

      const time = c[iTime] || "";
      const comment = c[iCom] || "";
      const user = c[iUser] || "";
      const vehicle = c[iVeh] || "";

      let marker = null;

      if (!isNaN(lat) && !isNaN(lng)) {
        marker = L.marker([lat,lng], {
          draggable: true,
          icon: createIcon(id)
        }).addTo(map);

        marker.bindPopup(`
          <b>${id}</b><br>
          Time: ${time}<br>
          Comment: ${comment}<br>
          User: ${user}<br>
          Vehicle: ${vehicle}
        `);

        marker.on('dragend', updateList);
      }

      pinData.push({ id, time, comment, user, vehicle, marker });
    });

    updateList();

    /* 最大IDの座標に移動＆ポップアップ表示 */
    const numericPins = pinData
      .filter(p => p.marker && !isNaN(parseFloat(p.id)))
      .map(p => ({ num: parseFloat(p.id), marker: p.marker }));

    if (numericPins.length > 0) {
      const maxPin = numericPins.reduce((a,b) => a.num > b.num ? a : b);
      const latlng = maxPin.marker.getLatLng();

      map.setView(latlng, 16);
      maxPin.marker.openPopup();
    }
  };

  reader.readAsText(file);
};

/* CSV保存 */
document.getElementById('saveCsv').onclick = () => {
  if (pinData.length === 0) {
    alert("保存するデータがありません");
    return;
  }

  const header = ["ID","Time","Lat","Lng","Comment","User","Vehicle"];
  const rows = pinData.map(p => {
    const ll = p.marker ? p.marker.getLatLng() : {lat:"", lng:""};
    return [
      p.id,
      p.time,
      ll.lat,
      ll.lng,
      p.comment,
      p.user,
      p.vehicle
    ].map(v => `"${v}"`).join(",");
  });

  const csvContent = [header.join(","), ...rows].join("\r\n");

  const blob = new Blob([csvContent], {type: "text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "data.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

/* 表更新 */
function updateList(){
  const tbody = document.getElementById('list');
  tbody.innerHTML = "";

  pinData.forEach((p, i) => {
    const ll = p.marker ? p.marker.getLatLng() : null;
    const tr = document.createElement('tr');

    if(!ll) tr.classList.add('no-coord');

    tr.innerHTML = `
      <td>${p.id}</td>
      <td>${p.time}</td>
      <td>${ll ? ll.lat : ""}</td>
      <td>${ll ? ll.lng : ""}</td>
      <td>${p.comment}</td>
      <td>${p.user}</td>
      <td>${p.vehicle}</td>
      <td><button>削除</button></td>
    `;

    tr.querySelector('button').onclick = () => {
      if(p.marker) map.removeLayer(p.marker);
      pinData.splice(i, 1);
      updateList();
    };

    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
